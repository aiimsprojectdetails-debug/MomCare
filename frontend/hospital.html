<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Care - Hospitals</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <!-- Left Navigation Sidebar -->
    <div class="sidebar">
        <div>
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div class="logo-text">Mom's<span> Care</span></div>
            </div>
            
            <ul class="nav-menu">
                <li>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="patient.html?all=true" class="nav-item">
                        <i class="fa-solid fa-users"></i>
                        <span>Patients</span>
                    </a>
                </li>
                <li>
                    <a href="hospital.html" class="nav-item active">
                        <i class="fa-solid fa-hospital"></i>
                        <span>Hospitals</span>
                    </a>
                </li>
                <li>
                    <a href="report.html" class="nav-item">
                        <i class="fa-solid fa-file-invoice"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <div class="user-profile-widget">
                <div class="user-widget-avatar" id="userAvatar">
                    DP
                </div>
                <div class="user-widget-info">
                    <div class="user-widget-name" id="userNameWidget">Dr. Ananya Sharma</div>
                    <div class="user-widget-role" id="userRoleWidget">Obstetrician</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Header Bar -->
        <div class="header-bar fade-in-up">
            <div class="header-left">
                <h1>Hospitals / Clinics Overview</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#projectModal">
                    <i class="fa-solid fa-circle-plus"></i> New Hospital
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="card p-3 mb-4 fade-in-up">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="search-box-container">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input 
                            type="text" 
                            class="search-input w-100" 
                            id="searchHospital" 
                            placeholder="Search hospitals by name..."
                        >
                    </div>
                </div>
                <div class="col-md-6 text-end mt-2 mt-md-0">
                    <span class="small text-muted fw-semibold" id="hospitalCountLabel">Loading hospitals...</span>
                </div>
            </div>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid fade-in-up" id="projectsGrid">
            <div class="text-center py-5 text-muted w-100">
                <i class="fa-solid fa-circle-notch fa-spin me-2" style="color: var(--primary); font-size: 24px;"></i> Loading hospitals...
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fa-solid fa-hospital me-2" style="color: var(--primary);"></i>Create New Hospital Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <div class="mb-4">
                        <label class="form-label">Hospital / Clinic Name *</label>
                        <input type="text" class="form-control" id="hospitalName" placeholder="e.g., Apollo Maternity Wing" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="projectDescription" rows="3" placeholder="Describe the goal of this maternal tracking group..."></textarea>
                    </div>
                    <hr class="my-4" style="border-color: var(--slate-200);">
                    <h6 class="form-label mb-3"><i class="fa-solid fa-user-doctor me-2"></i>Invite Collaborators</h6>
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="collabEmail" placeholder="Enter collaborator's medical email">
                        <button class="btn btn-primary-custom" type="button" id="addCollaborator">Invite</button>
                    </div>
                    <div id="collaboratorList" class="mt-3"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary-custom" id="createProjectBtn">Create Project</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE_URL = "http://localhost:5000";
let projectCollaborators = [];
const projectCollabList = document.getElementById("collaboratorList");
let allProjects = [];

document.addEventListener("DOMContentLoaded", async () => {
    // Get user info from localStorage
    const storedUser = JSON.parse(localStorage.getItem('user') || 'null');
    const userName = localStorage.getItem('userName') || storedUser?.full_name || storedUser?.name;
    const userEmail = localStorage.getItem('userEmail') || storedUser?.email;
    if (userName || userEmail) {
        document.getElementById('userNameWidget').textContent = userName || userEmail;
        document.getElementById('userRoleWidget').textContent = storedUser?.role || 'Provider';
        const initialsSource = userName || userEmail || 'DP';
        const initials = initialsSource.substring(0, 2).toUpperCase();
        document.getElementById('userAvatar').textContent = initials;
    }

    await loadHospitals();
});

async function loadHospitals() {
    try {
        const userEmail = localStorage.getItem('userEmail') || JSON.parse(localStorage.getItem('user') || '{}').email;
        const url = userEmail ? `${API_BASE_URL}/api/v1/projects?user_email=${userEmail}` : `${API_BASE_URL}/api/v1/projects`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.success && data.projects) {
            allProjects = data.projects;
            displayHospitals(allProjects);
        }
    } catch (error) {
        console.error(error);
        document.getElementById('projectsGrid').innerHTML = `
            <div class="alert alert-danger w-100">
                Failed to load hospitals: ${error.message}
            </div>`;
    }
}

function displayHospitals(projects) {
    const grid = document.getElementById('projectsGrid');
    document.getElementById('hospitalCountLabel').textContent = `${projects.length} hospitals`;
    
    if (!projects.length) {
        grid.innerHTML = `<div class="text-muted w-100 text-center py-5">No hospitals found. Click "New Hospital" to create one.</div>`;
        return;
    }

    grid.innerHTML = projects.map(project => `
        <div class="project-card">
            <div class="project-card-header">
                <div>
                    <h3>${project.hospital_name}</h3>
                    <p>${project.project_name}</p>
                </div>
                <span class="badge-custom badge-normal">${project.patient_count || 0} patients</span>
            </div>
            <p class="text-muted small">${project.description || 'No description added.'}</p>
            <div class="d-flex gap-2 mt-3">
                <button class="btn btn-primary-custom btn-sm" type="button" onclick="openProject('${project.id}')">
                    <i class="fa-solid fa-folder-open me-1"></i> Open
                </button>
                <button class="btn btn-outline-danger btn-sm" type="button" onclick="deleteProject('${project.id}')">
                    <i class="fa-solid fa-trash-can me-1"></i> Delete
                </button>
            </div>
        </div>
    `).join('');
}

function openProject(projectId) {
    localStorage.setItem('selectedProjectId', projectId);
    window.location.href = `patient.html?project_id=${projectId}`;
}

async function deleteProject(projectId) {
    if (!confirm('Delete this hospital project and all patients inside it?')) {
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/v1/projects/${projectId}`, {
            method: 'DELETE'
        });
        const data = await response.json();
        if (!data.success) {
            throw new Error(data.message || 'Delete failed');
        }
        await loadHospitals();
    } catch (error) {
        alert('Hospital delete failed: ' + error.message);
    }
}

document.getElementById("addCollaborator").addEventListener("click", () => {
    const email = document.getElementById("collabEmail").value.trim();
    if(!email) { alert("Enter email"); return; }
    if(projectCollaborators.includes(email)) { alert("Already added"); return; }
    projectCollaborators.push(email);
    renderProjectCollaborators();
    document.getElementById("collabEmail").value = "";
});

function renderProjectCollaborators(){
    projectCollabList.innerHTML = "";
    projectCollaborators.forEach((email, index) => {
        projectCollabList.innerHTML += `
            <div class="d-flex justify-content-between align-items-center border rounded p-2 mb-2 bg-light">
                <span class="small fw-semibold text-slate-700">${email}</span>
                <button class="btn btn-sm btn-danger py-1" type="button" onclick="removeProjectCollaborator(${index})">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>`;
    });
}

function removeProjectCollaborator(index){
    projectCollaborators.splice(index, 1);
    renderProjectCollaborators();
}

document.getElementById("createProjectBtn").addEventListener("click", async () => {
    const hospital = document.getElementById("hospitalName").value.trim();
    if(!hospital) { alert("Hospital Name Required"); return; }

    try {
        const userEmail = localStorage.getItem('userEmail') || JSON.parse(localStorage.getItem('user') || '{}').email;
        const response = await fetch(`${API_BASE_URL}/api/v1/projects`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                hospital_name: hospital,
                project_name: hospital,
                description: document.getElementById("projectDescription").value.trim(),
                collaborators: projectCollaborators,
                owner_email: userEmail
            })
        });
        const data = await response.json();
        if (!data.success) {
            throw new Error(data.message || 'Hospital creation failed');
        }

        alert("Hospital created successfully!");
        
        // Hide modal
        const modalEl = document.getElementById('projectModal');
        const modal = bootstrap.Modal.getInstance(modalEl);
        if (modal) modal.hide();
        
        // Reset form
        document.getElementById("projectForm").reset();
        projectCollaborators = [];
        renderProjectCollaborators();
        
        await loadHospitals();
    } catch (error) {
        alert("Hospital creation failed: " + error.message);
    }
});

// Search filter
document.getElementById('searchHospital').addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase().trim();
    const filtered = allProjects.filter(p => 
        p.hospital_name.toLowerCase().includes(q) || 
        p.project_name.toLowerCase().includes(q)
    );
    displayHospitals(filtered);
});
</script>
</body>
</html>
